# Avatar Pipeline — Global Settings
# ==================================

# ElevenLabs API key (read from env var ELEVENLABS_KEY if empty)
elevenlabs_key: ""

# Model directories
musetalk_dir: "~/MuseTalk"
comfyui_dir: "~/ComfyUI"

# Default avatar image (relative to pipeline root)
avatar_path: "avatar/avatar.png"

# Video defaults
default_fps: 25
default_orientation: "9:16"

# Output resolutions by orientation
output_resolution:
  "9:16": "1080x1920"
  "16:9": "1920x1080"
  "1:1": "1080x1080"

# LatentSync 1.6 settings
latentsync:
  inference_steps: 25
  lips_expression: 1.5
  input_fps: 25
  face_resolution: 512

# Local TTS settings (Kokoro — hexgrad/Kokoro-82M)
tts:
  engine: "kokoro"
  default_voice: "af_heart"   # American female, high quality
  speed: 1.0
  lang_code: "a"              # 'a'=American English, 'b'=British English
